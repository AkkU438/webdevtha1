<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Dealership</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="js/usedCars-TH-1.js"></script>
    <script src="js/main.js" defer></script>
</head>
<body>

    <header>
        <h1>Used Car Sales</h1>
    </header>
    <!-- Used the holy grail layout for the design, just removed the section portion -->
    <main>
        <aside class="filter-section">
            <h2>Filter Listings</h2>
            <form id="filter-form">
                <div class="filter-group">
                    <label>Year Range</label>
                    <div class="range-inputs">
                        <input type="number" id="min-year" placeholder="Min Year">
                        <input type="number" id="max-year" placeholder="Max Year">
                    </div>
                </div>

                <div class="filter-group">
                    <h2>Make</h2>
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-toyota" name="make" value="Toyota">
                        <label for="make-toyota">Toyota</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-honda" name="make" value="Honda">
                        <label for="make-honda">Honda</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-ford" name="make" value="Ford">
                        <label for="make-ford">Ford</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-nissan" name="make" value="Nissan">
                        <label for="make-nissan">Nissan</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-tesla" name="make" value="Tesla">
                        <label for="make-tesla">Tesla</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-lexus" name="make" value="Lexus">
                        <label for="make-lexus">Lexus</label>
                    </div>
                    
                    <div class="checkbox-pair">
                        <input type="checkbox" id="make-bmw" name="make" value="BMW">
                        <label for="make-bmw">BMW</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="max-mileage">Max Mileage</label>
                    <input type="number" id="max-mileage" placeholder="e.g. 30000">
                </div>

                <div class="filter-group">
                    <label>Price Range</label>
                    <div class="range-inputs">
                        <input type="number" id="min-price" placeholder="Min $">
                        <input type="number" id="max-price" placeholder="Max $">
                    </div>
                </div>

            <div class="filter-group">
                <h2>Color</h2>
                
                <div class="checkbox-pair">
                    <input type="checkbox" id="color-silver" name="color" value="Silver">
                    <label for="color-silver">Silver</label>
                </div>
                
                <div class="checkbox-pair">
                    <input type="checkbox" id="color-white" name="color" value="White">
                    <label for="color-white">White</label>
                </div>
                
                <div class="checkbox-pair">
                    <input type="checkbox" id="color-black" name="color" value="Black">
                    <label for="color-black">Black</label>
                </div>
                
                <div class="checkbox-pair">
                    <input type="checkbox" id="color-blue" name="color" value="Blue">
                    <label for="color-blue">Blue</label>
                </div>
                
                <div class="checkbox-pair">
                    <input type="checkbox" id="color-red" name="color" value="Red">
                    <label for="color-red">Red</label>
                </div>
            </div>

                <button type="button" id="apply-filters">Apply Filters</button>
                <button type="reset" id="reset-filters">Clear All</button>
            </form>
        </aside>

        <section class="listings-section">
            <div id="car-container" class="car-grid">
                </div>
        </section>
    </main>
</body>
</html>
